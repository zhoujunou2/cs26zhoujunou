<body>

    <div id="ipList"></div>
    <h3 id="dt1"></h3>
    <h3 id="dt2"></h3>
<script>
const date = new Date();
const date1 = date.toLocaleString('en-uk', {
hour12:true, weekday:"short", hour:"2-digit", minute:"2-digit", second:"2-digit",
month:"short", year:"numeric", day:"2-digit"
});
document.getElementById("dt1").innerText = date1;
document.getElementById("dt2").innerText = "" + Date.now();
</script>
